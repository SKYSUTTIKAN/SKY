<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Security Scan</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Consolas, monospace;
            color: #00ff66;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 750px;
            max-width: 90%;
            background: rgba(0, 0, 0, .82);
            border: 1px solid #00ff66;
            box-shadow: 0 0 25px #00ff66;
            padding: 25px;
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        .status {
            font-size: 18px;
            margin: 10px 0;
        }

        .progress {
            width: 100%;
            height: 26px;
            border: 1px solid #00ff66;
            margin-top: 12px;
        }

        .fill {
            width: 0%;
            height: 100%;
            background: #00ff66;
        }

        .log {
            margin-top: 20px;
            height: 220px;
            overflow: hidden;
            background: #050505;
            border: 1px solid #00aa44;
            padding: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .end {
            display: none;
            text-align: center;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            background: #00ff66;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <canvas id="matrix"></canvas>

    <div class="panel" id="scan">

        <h1>SECURITY TERMINAL</h1>

        <div class="status">
            Scanning system...
            <span id="percent">0%</span>
        </div>

        <div class="progress">
            <div class="fill" id="fill"></div>
        </div>

        <div class="log" id="log"></div>

    </div>

    <div class="panel end" id="finish">

        <h1>😂 โดนแกล้งแล้ว!</h1>

        <h2>ไม่มีการแฮ็ก ไม่มีการสแกนเครื่อง</h2>

        <p style="margin-top:20px">
            ทั้งหมดเป็นแค่แอนิเมชันเพื่อความสนุก
        </p>

        <button onclick="location.reload()">
            เล่นอีกครั้ง
        </button>

    </div>

    <script>
        // Matrix Effect

        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");

        canvas.width = innerWidth;
        canvas.height = innerHeight;

        const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";
        const font = 16;
        const columns = Math.floor(canvas.width / font);
        const drops = [];

        for (let i = 0; i < columns; i++) drops[i] = 1;

        function matrix() {

            ctx.fillStyle = "rgba(0,0,0,0.06)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff66";
            ctx.font = font + "px monospace";

            for (let i = 0; i < drops.length; i++) {

                const text = letters[Math.floor(Math.random() * letters.length)];

                ctx.fillText(text, i * font, drops[i] * font);

                if (drops[i] * font > canvas.height && Math.random() > 0.975)
                    drops[i] = 0;

                drops[i]++;

            }

        }

        setInterval(matrix, 35);


        // Fake Scan

        const log = document.getElementById("log");
        const fill = document.getElementById("fill");
        const percent = document.getElementById("percent");

        const files = [
            "Checking kernel...",
            "Scanning memory...",
            "Analyzing registry...",
            "Scanning photos...",
            "Checking browser cache...",
            "Reading system logs...",
            "Decrypting modules...",
            "Inspecting USB devices...",
            "Scanning downloads...",
            "Checking startup apps...",
            "Searching for malware...",
            "Analyzing network...",
            "Cleaning temporary files..."
        ];

        let p = 0;
        const duration = 30000; // 30 วินาที
        const interval = duration / 100; // 300 ms ต่อ 1%

        const timer = setInterval(() => {
            p++;

            fill.style.width = p + "%";
            percent.textContent = p + "%";

            if (Math.random() > 0.3) {
                const line = document.createElement("div");
                line.textContent =
                    "> " + files[Math.floor(Math.random() * files.length)];
                log.appendChild(line);
                log.scrollTop = log.scrollHeight;
            }

            if (p >= 100) {
                clearInterval(timer);
                document.getElementById("scan").style.display = "none";
                document.getElementById("finish").style.display = "block";
            }
        }, interval);




    </script>

</body>

</html>
